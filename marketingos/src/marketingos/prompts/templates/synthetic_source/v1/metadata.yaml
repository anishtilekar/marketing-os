agent: synthetic_source
version: v1
description: >-
  Canonical Synthetic Source paraphrasing prompt set. Rewrites already
  category-partitioned observed-fact statements (facts, descriptions,
  brand_characteristics) into neutral, third-person, genuinely reworded
  prose — one output statement per input statement, in order. Paraphrasing
  only: partitioning, deduplication, length-bounding, and keyword extraction
  all remain deterministic, code-owned steps applied before and after this
  step, unchanged. NOTE: at the time of writing, SyntheticSourceAgent performs
  the entire transformation deterministically in Python (`_normalize_statement`
  and helpers) using a small fixed regex table (we/our/us -> "the business")
  and does not call a language model; this prompt is a forward-looking
  specification for an LLM-assisted paraphrase step. Unlike Designer and
  Packaging, this agent's docstring does not explicitly invite an LLM
  subclass — this template's rationale instead rests on a concrete gap in the
  current implementation: the regex table only rewrites a fixed set of
  first-person pronouns, so any statement without those pronouns (including
  taglines and slogans in brand_characteristics) currently passes through
  completely verbatim if it fits the length bound. That gap matches this
  agent's own documented failure mode in the MarketingOS architecture spec —
  "Over-reliance on verbatim source text" — and its retry policy, "1 revise
  pass if similarity check fails," which presumes a genuine paraphrase-quality
  rewrite this regex table does not provide.
author: MarketingOS Prompt Engineering
created_at: 2025-12-12T09:00:00Z
updated_at: 2026-01-20T09:00:00Z
tags:
  - synthetic-source
  - paraphrasing
  - copyright-safe
  - neutral-voice
  - batch-invocation
  - structured-output
  - deterministic
  - anti-hallucination
  - not-yet-wired

# Provider guidance. `recommended_model` is the primary target; `model_preferences`
# is the ordered fallback list, escalating to more capable models if needed. The
# prompt is written to behave consistently across all of them.
recommended_model: gemini-2.5-flash
model_preferences:
  - gemini-2.5-flash
  - claude-opus-4
  - gpt-5

# Sampling defaults: low-but-nonzero temperature — genuine paraphrase benefits
# from some lexical variety versus the source, but must stay deterministic in
# substance and count (1:1 with the input) run over run. The token ceiling
# covers a full research result's worth of facts, descriptions, and brand
# statements in one call, with headroom.
temperature: 0.2
max_tokens: 3000

expected_input: >-
  A single JSON object with subject and three pre-partitioned arrays of raw
  observed-fact statements: facts, descriptions, brand_characteristics. Any
  array may be empty.
expected_output: >-
  A single JSON object with the same three array names, each rewritten 1:1
  with its input array (same length, same order): neutral third-person,
  genuinely reworded statements that add no new information. Deduplication
  (via content fingerprint), length-bounding (via sentence-boundary
  condensing), and keyword extraction remain separate, deterministic,
  code-owned steps applied to this output, not part of the model's job.
