agent: strategist
version: v1
description: >-
  Canonical Strategist prompt set. Converts a validated BusinessContext (observed
  facts and labelled assumptions) into a grounded first-week Strategy: goals,
  target audience, positioning, key messages, content pillars, and success
  metrics. Every goal, the target audience, and every content pillar must cite
  the fact/assumption ids that justify them; citations are validated against the
  context in code and ungrounded output is rejected and regenerated. Strategy
  only — no content ideas, copy, or creative assets, which belong to the
  downstream Planner and Copywriter agents.
author: MarketingOS Prompt Engineering
created_at: 2025-11-25T09:00:00Z
updated_at: 2026-01-20T09:00:00Z
tags:
  - strategy
  - first-week-strategy
  - grounded-output
  - fact-citation
  - structured-output
  - deterministic
  - anti-hallucination

# Provider guidance. `recommended_model` is the primary target; `model_preferences`
# is the ordered fallback list, escalating to more capable models if needed. The
# prompt is written to behave consistently across all of them.
recommended_model: gemini-2.5-flash
model_preferences:
  - gemini-2.5-flash
  - claude-opus-4
  - gpt-5

# Sampling defaults: low temperature, since goals, audience, and pillars must be
# grounded, verifiable citations rather than creative variation. The token
# ceiling covers up to 5 goals, 1 audience, 8 key messages, 5 content pillars,
# and 8 success metrics with headroom.
temperature: 0.2
max_tokens: 3000

expected_input: >-
  A single JSON object with a business `subject`, `facts` (id, category,
  statement, confidence), `assumptions` (id, statement, confidence), and the
  convenience lists `offerings`, `brand_messages`, `social_profiles`.
expected_output: >-
  A single JSON object with `goals` (1-5, each grounded_in non-empty), exactly
  one `target_audience` (grounded_in non-empty), `positioning` (a string),
  `key_messages` (1-8 strings), `content_pillars` (1-5, unique names, each
  grounded_in non-empty), and `success_metrics` (1-8, each with name/target/
  measurement). goals, target_audience, and content_pillars citations are
  validated against the input context's real fact/assumption ids; unknown ids
  cause the output to be rejected and regenerated.
