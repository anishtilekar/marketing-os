agent: designer
version: v1
description: >-
  Canonical Designer creative-direction prompt set. Composes the image
  generation `prompt` and `negative_prompt` for a single post creative from its
  topic, caption, reusable layout template, and brand style. Coordination only —
  never invents a subject, claim, or in-image text beyond what the upstream
  plan, caption, template, and brand already establish. NOTE: at the time of
  writing, DesignerAgent composes CreativeSpec deterministically in Python
  (`_compose_spec`) and does not call a language model; this prompt is a
  forward-looking specification for an LLM-assisted creative-direction step.
  The agent's own docstring already anticipates this — its `prompts` parameter
  is documented as "unused by the default deterministic spec composer;
  available to subclasses."
author: MarketingOS Prompt Engineering
created_at: 2025-12-01T09:00:00Z
updated_at: 2026-01-20T09:00:00Z
tags:
  - creative-direction
  - image-generation-prompt
  - brand-consistency
  - per-item-invocation
  - structured-output
  - deterministic
  - anti-hallucination
  - not-yet-wired

# Provider guidance. `recommended_model` is the primary target; `model_preferences`
# is the ordered fallback list, escalating to more capable models if needed. The
# prompt is written to behave consistently across all of them.
recommended_model: gemini-2.5-flash
model_preferences:
  - gemini-2.5-flash
  - claude-opus-4
  - gpt-5

# Sampling defaults: low-but-nonzero temperature — image prompts benefit from
# some descriptive variety, but must stay deterministic in substance run over
# run. The token ceiling is generous for a single-creative prompt pair with
# headroom; this agent is invoked once per post creative (REQUIRED_POSTS calls
# per package), not once for the whole batch.
temperature: 0.2
max_tokens: 800

expected_input: >-
  A single JSON object for one post creative: subject, topic, caption_headline,
  caption_keywords, template (name, width, height, layout, style_keywords),
  brand (primary_color, secondary_color, font_family, style_keywords), and
  baseline_negative_prompt.
expected_output: >-
  A single JSON object with `prompt` (a vivid, specific image-generation prompt
  honouring the template layout and brand style) and `negative_prompt` (the
  baseline exclusions, optionally extended). Dimensions, template choice, and
  style_keywords remain system-determined and are not part of the model's
  output.
